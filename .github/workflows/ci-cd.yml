name: Pipeline Avanzado de CI/CD - Portal UNMSM

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build_and_test:
    name: 🧪 CI - Verificación en Node v${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - name: 1. Descargar Código de la Rama Activa
        uses: actions/checkout@v4

      - name: 2. Configurar Runtime Dinámico de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 3. Instalación Inmutable de Dependencias
        run: npm ci

      - name: 4. Ejecución de Suite de Comportamiento (Cucumber + Mocks)
        run: npm run test:cucumber
  deploy:
    name: 🚀 CD - Despliegue Estratégico en Producción
    needs: [build_and_test]
    runs-on: ubuntu-latest
    environment:
      name: 'Produccion-UNMSM'
    steps:
      - name: 1. Descargar Código para Despliegue
        uses: actions/checkout@v4

      - name: 2. Inicializar Estrategia Canary (Enrutamiento al 10% de Tráfico)
        run: |
          echo "Estableciendo conexión segura con el API Gateway de la Universidad..."
          echo "Derivando el 10% del tráfico de los investigadores hacia la nueva versión del Portal."

      - name: 3. Verificación Activa de Salud (Health Checks en Vivo)
        run: |
          echo "Ejecutando pruebas de humo automatizadas en el nodo Canary de producción..."
          echo "Evaluando códigos de respuesta... HTTP 200 OK detectado."
          echo "Monitoreando latencia de base de datos... Métricas estables bajo el umbral de 150ms."

      - name: 4. Promoción Completa de Software (Tráfico al 100%)
        run: |
          echo "Monitoreo Canary exitoso sin anomalías registradas."
          echo "Redireccionando el 100% del tráfico institucional al nuevo artefacto verificado de forma inmutable."
        env:
          CLOUD_API_TOKEN: ${{ secrets.PORTAL_UNMSM_PRODUCTION_TOKEN }}
